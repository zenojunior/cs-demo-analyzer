[package]
name = "cs2-demo-parser-wasm"
version = "0.0.0"
edition = "2021"
description = "CS2 demo parser in WebAssembly: reads a .dem and emits the Replay JSON of the 2D replay schema. Runs in the browser, inside a Web Worker."

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# The native iteration build uses --no-default-features to become a binary.
default = ["wasm"]
wasm = ["dep:wasm-bindgen", "dep:console_error_panic_hook", "dep:js-sys"]

[dependencies]
source2-demo = { version = "0.5.4", default-features = false, features = ["cs2"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = { version = "0.2", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
js-sys = { version = "0.3", optional = true }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
